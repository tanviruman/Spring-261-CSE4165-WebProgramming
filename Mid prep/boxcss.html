<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card UI Example</title>

  <style>
    /* ── ALWAYS START WITH THIS ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: #333;
      background-color: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* ── CARD STYLE (used everywhere) ── */
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border: 1px solid #e2e6ea;
      max-width: 350px;
      text-align: center;
    }

    /* ── BUTTON STYLE ── */
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background-color: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      margin-top: 16px;
    }

    .btn:hover {
      background-color: #1e4ed8;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Welcome</h2>
    <p style="margin-top:10px;">
      This is a simple card using your CSS design.
    </p>

    <a href="#" class="btn">Click Me</a>
  </div>

</body>
</html>
