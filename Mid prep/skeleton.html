<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Title</title>
  <style>
    /* ── RESET ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; color: #333; }
    a { text-decoration: none; }
    ul { list-style: none; }
    img { max-width: 100%; }
    input, button, select, textarea { font-family: inherit; }

    /* ── REUSABLE UTILITIES ── */
    .btn {
      display: inline-block; padding: 10px 24px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; font-weight: 600;
    }
    .card {
      background: #fff; padding: 24px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
   .color-1{
    background-color: #C1CDFF;
}

    /* ── YOUR QUESTION CSS BELOW ── */

  </style>
</head>
<body>

  <!-- YOUR HTML BELOW -->
   <div class="page">

  <header class="header" style="grid-area: header;">
    <h2>Header</h2>
  </header>

  <aside class="sidebar" style="grid-area: sidebar;">
    <p>Sidebar</p>
  </aside>

  <main class="main" style="grid-area: main;">
    <p>Main Content</p>
  </main>

  <footer class="footer" style="grid-area: footer;">
    <p>Footer</p>
  </footer>

</div>

</body>
</html>
