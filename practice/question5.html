<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="question5.css">
</head>
<body>
    <div class="studio-app">
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="logo">CreatorStudio</div>
            <div class="search-container">
                <input type="text" class="global-search" placeholder="Search courses...">
            </div>
            <div class="profile-icon">MK</div>
        </div>

        <!-- Two Column Layout -->
        <div class="content-wrapper">
            <!-- Left Area: Courses -->
            <div class="course-area">
                <div class="area-title">Draft Courses</div>
                <div class="course-grid">
                    
                    <div class="course-card">
                        <div class="thumb thumb-purple"></div>
                        <div class="card-body">
                            <div class="course-title">Intro to Python</div>
                            <div class="duration-bubble">1h 45m</div>
                            <button class="edit-btn">Edit Course</button>
                        </div>
                    </div>

                    <div class="course-card">
                        <div class="thumb thumb-orange"></div>
                        <div class="card-body">
                            <div class="course-title">Advanced CSS</div>
                            <div class="duration-bubble">3h 20m</div>
                            <button class="edit-btn">Edit Course</button>
                        </div>
                    </div>

                    <div class="course-card">
                        <div class="thumb thumb-teal"></div>
                        <div class="card-body">
                            <div class="course-title">UI Design Basics</div>
                            <div class="duration-bubble">2h 00m</div>
                            <button class="edit-btn">Edit Course</button>
                        </div>
                    </div>

                    <div class="course-card">
                        <div class="thumb thumb-blue"></div>
                        <div class="card-body">
                            <div class="course-title">React Hooks</div>
                            <div class="duration-bubble">4h 10m</div>
                            <button class="edit-btn">Edit Course</button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right Area: Upload Panel -->
            <div class="side-panel">
                <div class="panel-card">
                    <div class="panel-title">Quick Upload</div>
                    <div class="drag-drop-zone">
                        <span class="upload-text">Drag & Drop videos here</span>
                        <span class="upload-sub">MP4, MOV up to 2GB</span>
                    </div>
                    <button class="browse-btn">Browse Files</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
