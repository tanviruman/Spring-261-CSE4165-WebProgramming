<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="question3.css">
</head>
<body>
    <div class="workspace-app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">WorkSpace</div>
            <div class="menu-item">Book Desk</div>
            <div class="menu-item">My Passes</div>
        </div>

        <!-- Main Content -->
        <div class="main-area">
            <div class="top-bar">
                <input type="text" class="search-input" placeholder="Search locations...">
                <div class="square-profile">AL</div>
            </div>

            <div class="desk-grid">
                <div class="desk-card">
                    <div class="card-head">
                        <div class="desk-title">Window Desk A</div>
                        <div class="status-bubble available"></div>
                    </div>
                    <button class="book-btn">Book Now</button>
                </div>
                
                <div class="desk-card">
                    <div class="card-head">
                        <div class="desk-title">Quiet Zone 1</div>
                        <div class="status-bubble taken"></div>
                    </div>
                    <button class="book-btn disabled">Unavailable</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
