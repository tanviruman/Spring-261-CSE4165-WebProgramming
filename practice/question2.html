<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="question2.css">
</head>
<body>
    <div class="rental-app">
        <!-- Left Area -->
        <div class="left-content">
            <div class="top-nav">
                <div class="brand">GearRent</div>
                <input type="text" class="search-bar" placeholder="Search gadgets...">
                <div class="profile-icon">JS</div>
            </div>

            <div class="gadget-grid">
                <div class="card card-gray">
                    <div class="card-title">MacBook Pro M2</div>
                    <div class="price-bubble">$40/day</div>
                </div>
                <div class="card card-blue">
                    <div class="card-title">Sony A7III Camera</div>
                    <div class="price-bubble">$35/day</div>
                </div>
                <div class="card card-gray">
                    <div class="card-title">iPad Pro 12.9"</div>
                    <div class="price-bubble">$20/day</div>
                </div>
            </div>
        </div>

        <!-- Right Cart Area -->
        <div class="right-cart">
            <div class="cart-title">Your Rental</div>
            <div class="cart-subtotal">Subtotal: $0.00</div>
            <button class="checkout-btn">Checkout</button>
        </div>
    </div>
</body>
</html>
