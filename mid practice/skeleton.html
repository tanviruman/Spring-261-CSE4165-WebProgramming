<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Title</title>
  <style>
    /* ── RESET (সবসময় এটা দিয়ে শুরু) ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; color: #333; }
    a { text-decoration: none; }
    ul { list-style: none; }
    img { max-width: 100%; }
    input, button, select, textarea { font-family: inherit; }

    /* ── REUSABLE (এগুলো রেখে দাও) ── */
    .btn {
      display: inline-block; padding: 10px 24px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; font-weight: 600;
    }
    .card {
      background: #fff; padding: 24px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    /* ── YOUR CSS BELOW ── */

    .dashboard-layout {
  display: grid;
  grid-template-columns: 220px 1fr; /* Sidebar 220px, main takes rest */
  min-height: 100vh;
}
.sidebar {
  background: #1e3a5f; /* Dark blue from Summer paper */
  color: #fff;
  padding: 24px;
}
.sidebar ul { list-style: none; margin-top: 20px; }
.sidebar ul li a {
  display: block;
  padding: 10px 12px;
  color: #ccc;
  text-decoration: none;
  border-radius: 6px;
  margin-bottom: 4px;
}
.sidebar ul li a.active {
  background: #2a5298;
  color: #fff;
}
.main-content {
  padding: 28px;
  background: #f8f9fa;
}
.courses-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 20px 0;
}
.course-card {
  padding: 24px 20px;
  border-radius: 10px;
  color: #fff;
  font-weight: 700;
}
/* PROGRESS BAR */
.progress-track {
  width: 100%;
  height: 6px;
  background: #ddd; /* Grey track */
  border-radius: 3px;
}
.progress-fill {
  height: 100%;
  background: #16a34a; /* Green fill */
  border-radius: 3px;
  /* Width is set inline: style="width: 75%" */
}
  </style>
</head>
<body>

  <!-- YOUR HTML BELOW -->
   <div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="sidebar-title">UIU LEARNING HUB</h2>
    <nav>
      <!-- <ul>
        <li><a href="#" class="active">Dashboard</a></li>
        <li><a href="#">My Courses</a></li>
        <li><a href="#">Assignments</a></li>
        <li><a href="#">Exams</a></li>
      </ul> -->
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <h1>Welcome to Your Learning Dashboard</h1>

    <!-- COURSE CARDS -->
    <div class="courses-grid">
      <div class="course-card" style="background: linear-gradient(135deg, #56ab2f, #a8e063);">
        <h3>CSE 4165: Web Programming</h3>
        <p>Prof. Rahman</p>
      </div>
      <div class="course-card" style="background: linear-gradient(135deg, #f46b45, #eea849);">
        <h3>CSE 3115: Database Systems</h3>
        <p>Dr. Karim</p>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-section">
      <span>Progress: 75%</span>
      <div class="progress-track">
        <div class="progress-fill" style="width: 75%"></div>
      </div>
    </div>
  </main>
</div>

</body>
</html>
